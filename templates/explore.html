<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: #D1DECF;
    color: #333;
}

.search-area {
    background: #D1DECF;
}

h1 {
    text-align: center;
    padding: 20px 0;
    font-size: 2rem;
    background-color: #388E3C;
    color: #fff;
    margin: 0;
}

.controls {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
    background: #D1DECF;
}

.tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: #D1DECF;
    padding: 10px 0;
    gap: 10px;
}

/* 🔥 Updated Tabs */
.tab {
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
    background: #ffffff;      /* WHITE tabs */
    border: 1px solid #ccc;   /* light border */
    color: #333;
    transition: all 0.3s;
    font-weight: 500;
}

/* 🔥 Active Tab */
.tab.active {
    background: #388E3C;
    color: #fff;
    border-color: #388E3C;
}

.controls input, .controls select {
    padding: 8px 12px;
    font-size: 1rem;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.plant-container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.section {
    margin-bottom: 30px;
}

.section h2 {
    background-color: #388E3C;
    color: white;
    padding: 10px;
    border-radius: 5px;
}

.plants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 10px;
    justify-content: center;
}

.plant-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    text-align: center;
    transition: transform 0.2s;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.plant-card:hover {
    transform: translateY(-5px);
}

.plant-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 5px;
    margin-bottom: 10px;
}

.plant-card h3 {
    margin: 10px 0 5px 0;
    font-size: 1rem;
}

.plant-card p {
    font-size: 0.9rem;
    margin: 5px 0 15px 0;
    color: #555;
}

.plant-card button {
    padding: 8px 14px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s;
}

.plant-card button:hover {
    background-color: #2E7D32;
}

.back-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    padding: 8px 15px;
    background-color: #388E3C;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    z-index: 1000;
}


</style>
</head>

function setActiveTab(activeTab) {
    document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
    activeTab.classList.add("active");
}

function displayPlants(category = "", searchQuery = "") {
    plantContainer.innerHTML = "";
    let dataToDisplay = [];

    if(category === "Women’s Health") dataToDisplay = womensHealthData;
    else if(category === "Respiratory") dataToDisplay = respiratoryData;
    else if(category === "Skin & Hair") dataToDisplay = skinHairData;
    else if(category === "Liver Health") dataToDisplay = liverHealthData;
    else if(category === "Immunity") dataToDisplay = immunityData;
    else if(category === "Stress & Sleep") dataToDisplay = stressSleepData;
    else if(category === "Pain Relief") dataToDisplay = painReliefData;
    else dataToDisplay = [].concat(womensHealthData, respiratoryData, skinHairData, liverHealthData, immunityData, stressSleepData, painReliefData);

    dataToDisplay.forEach(section => {
        const filteredPlants = section.plants.filter(plant => plant.name.toLowerCase().includes(searchQuery));
        if(filteredPlants.length > 0) {
            const secDiv = document.createElement("div");
            secDiv.className = "section";
            secDiv.innerHTML = `<h2>${section.heading}</h2>`;
            const gridDiv = document.createElement("div");
            gridDiv.className = "plants-grid";

            filteredPlants.forEach(plant => {
                const plantCard = document.createElement("div");
                plantCard.className = "plant-card";
                plantCard.innerHTML = `
                    <img src="${plant.img}" alt="${plant.name}">
                    <h3>${plant.name}</h3>
                    <p>${plant.desc}</p>
                    <a href="/${plant.name.toLowerCase().replace(/ /g,'')}">
                    <button>Know More</button>
                    </a>
                `;
                gridDiv.appendChild(plantCard);
            });

            secDiv.appendChild(gridDiv);
            plantContainer.appendChild(secDiv);
        }
    });
}

function filterPlants(category, activeTab) {
    setActiveTab(activeTab);
    displayPlants(category, searchInput.value.trim().toLowerCase());
}

// ---- CREATE TABS ----
categories.forEach((cat, index) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    if(index === 0) tab.classList.add("active");
    tab.textContent = cat;
    tab.addEventListener("click", () => {
        filterSelect.value = cat;
        filterPlants(cat, tab);
    });
    tabsContainer.appendChild(tab);
});

// ---- EVENTS ----
searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim().toLowerCase();
    // If search box is empty, show selected filter tab
    if(query === "") {
        displayPlants(filterSelect.value, "");
        const tabToActivate = Array.from(tabsContainer.children).find(tab => tab.textContent === filterSelect.value);
        if(tabToActivate) setActiveTab(tabToActivate);
    } else {
        // Global search across all categories
        displayPlants("", query);
        setActiveTab(null); // no tab active when searching globally
    }
});
